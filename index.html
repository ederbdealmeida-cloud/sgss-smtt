ce('button',{className:'btn-icon',title:'Enviar reset de senha',
                  style:{color:'#2563eb'},
                  onClick:function(){
                    if(!u.email){notify('⚠️ Utilizador sem e-mail.');return;}
                    fbSendReset(u.email).then(function(r){
                      if(r.ok)notify('✅ Email enviado para '+u.email);
                      else notify('⚠️ '+r.error);
                    });
                  }},'🔑'),
