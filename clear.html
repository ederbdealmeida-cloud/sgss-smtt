<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><title>Limpar cache SGSS</title></head><body><h2>A limpar cache...</h2><script>(async function(){  if("serviceWorker" in navigator){    const regs=await navigator.serviceWorker.getRegistrations();    for(const r of regs) await r.unregister();  }  const keys=await caches.keys();  for(const k of keys) await caches.delete(k);  document.querySelector("h2").textContent="Cache limpo! A redirecionar...";  setTimeout(()=>location.replace("./index.html?cb="+Date.now()),1000);})()</script></body></html>
